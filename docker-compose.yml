version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: gbrain_db
    environment:
      POSTGRES_USER: gbrain
      POSTGRES_PASSWORD: gbrainpassword
      POSTGRES_DB: project_governance_brain
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbrain -d project_governance_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gbrain_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: gbrain_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: gbrainadmin
      MINIO_ROOT_PASSWORD: gbrainpassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gbrain_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://gbrain:gbrainpassword@db:5432/project_governance_brain
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=gbrainadmin
      - MINIO_SECRET_KEY=gbrainpassword123
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gbrain_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
  redis_data:
  minio_data:
