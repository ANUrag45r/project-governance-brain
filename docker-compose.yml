version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gbrain_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Monunag22
      POSTGRES_DB: project_governance_brain
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_governance_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gbrain_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gbrain_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:Monunag22@db:5432/project_governance_brain
      - REDIS_URL=redis://redis:6379/0
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gbrain_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
  redis_data:
